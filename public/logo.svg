<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">

  <!-- ── Card base ───────────────────────────────────────── -->
  <rect width="300" height="420" rx="18" fill="#f0ebe0"/>
  <rect x="9"  y="9"  width="282" height="402" rx="12" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="13" y="13" width="274" height="394" rx="9"  fill="none" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- ── THE ──────────────────────────────────────────────── -->
  <text x="150" y="44" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="13" letter-spacing="7" fill="#1a1a1a">THE</text>

  <!-- ── LIVING CRAFT ─────────────────────────────────────── -->
  <text x="150" y="82" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="38" font-weight="bold" fill="#0a0a0a">LIVING</text>
  <text x="150" y="116" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="38" font-weight="bold" fill="#0a0a0a">CRAFT</text>

  <!-- Separator -->
  <line x1="38" y1="124" x2="262" y2="124" stroke="#1a1a1a" stroke-width="0.9"/>

  <!-- ════════════════════════════════════════════════════════
       ILLUSTRATION  (y 128 → 272)
       ════════════════════════════════════════════════════════ -->

  <!-- ── Neural network top-left ─────────────────────────── -->
  <g opacity="0.6" stroke="#1a1a1a" fill="none">
    <!-- ring of 6 nodes + centre -->
    <circle cx="60"  cy="173" r="5.5" stroke-width="1.3"/>
    <circle cx="45"  cy="160" r="4"   stroke-width="1"/>
    <circle cx="75"  cy="160" r="4"   stroke-width="1"/>
    <circle cx="45"  cy="186" r="4"   stroke-width="1"/>
    <circle cx="75"  cy="186" r="4"   stroke-width="1"/>
    <circle cx="60"  cy="152" r="4"   stroke-width="1"/>
    <circle cx="60"  cy="194" r="4"   stroke-width="1"/>
    <!-- spokes to centre -->
    <line x1="60" y1="167" x2="45" y2="160" stroke-width="0.9"/>
    <line x1="60" y1="167" x2="75" y2="160" stroke-width="0.9"/>
    <line x1="60" y1="179" x2="45" y2="186" stroke-width="0.9"/>
    <line x1="60" y1="179" x2="75" y2="186" stroke-width="0.9"/>
    <line x1="60" y1="167" x2="60" y2="156" stroke-width="0.9"/>
    <line x1="60" y1="179" x2="60" y2="190" stroke-width="0.9"/>
    <!-- ring edges (lighter) -->
    <line x1="45" y1="160" x2="75" y2="160" stroke-width="0.5" opacity="0.4"/>
    <line x1="45" y1="186" x2="75" y2="186" stroke-width="0.5" opacity="0.4"/>
    <line x1="45" y1="160" x2="45" y2="186" stroke-width="0.5" opacity="0.4"/>
    <line x1="75" y1="160" x2="75" y2="186" stroke-width="0.5" opacity="0.4"/>
    <!-- filled dots -->
    <circle cx="60" cy="173" r="2.5" fill="#1a1a1a"/>
    <circle cx="45" cy="160" r="1.8" fill="#1a1a1a"/>
    <circle cx="75" cy="160" r="1.8" fill="#1a1a1a"/>
  </g>

  <!-- ── Gear mechanism top-right ────────────────────────── -->
  <g opacity="0.65">
    <!-- Large gear ring + teeth -->
    <circle cx="248" cy="170" r="24" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="248" cy="170" r="18" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    <circle cx="248" cy="170" r="4.5" fill="#1a1a1a"/>
    <!-- 8 teeth as small rects rotated -->
    <g fill="#1a1a1a">
      <rect x="245" y="144" width="6" height="5" rx="1"/>
      <rect x="245" y="191" width="6" height="5" rx="1"/>
      <rect x="222" y="167" width="5" height="6" rx="1"/>
      <rect x="269" y="167" width="5" height="6" rx="1"/>
      <rect x="230" y="149" width="5" height="5" rx="1" transform="rotate(-45,232,151)"/>
      <rect x="261" y="149" width="5" height="5" rx="1" transform="rotate(45,264,151)"/>
      <rect x="230" y="182" width="5" height="5" rx="1" transform="rotate(45,232,185)"/>
      <rect x="261" y="182" width="5" height="5" rx="1" transform="rotate(-45,264,185)"/>
    </g>
    <!-- Spokes -->
    <g stroke="#1a1a1a" stroke-width="1.2">
      <line x1="248" y1="152" x2="248" y2="165"/>
      <line x1="248" y1="175" x2="248" y2="188"/>
      <line x1="230" y1="170" x2="243" y2="170"/>
      <line x1="253" y1="170" x2="266" y2="170"/>
      <line x1="236" y1="158" x2="245" y2="167"/>
      <line x1="251" y1="173" x2="260" y2="182"/>
      <line x1="260" y1="158" x2="251" y2="167"/>
      <line x1="245" y1="173" x2="236" y2="182"/>
    </g>
    <!-- Small satellite gear -->
    <circle cx="230" cy="148" r="10" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <circle cx="230" cy="148" r="3.5" fill="#1a1a1a"/>
    <g fill="#1a1a1a">
      <rect x="227" y="136" width="6" height="4" rx="1"/>
      <rect x="227" y="154" width="6" height="4" rx="1"/>
      <rect x="218" y="145" width="4" height="6" rx="1"/>
      <rect x="238" y="145" width="4" height="6" rx="1"/>
    </g>
    <!-- Shaft between gears -->
    <line x1="240" y1="152" x2="248" y2="158" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- ── Craftsman ─────────────────────────────────────────── -->

  <!-- Head -->
  <ellipse cx="150" cy="195" rx="18" ry="18.5" fill="#c49060"/>
  <!-- Neck -->
  <rect x="144" y="207" width="12" height="10" rx="2" fill="#c49060"/>
  <!-- Flat cap -->
  <ellipse cx="150" cy="184" rx="23" ry="6" fill="#1e1e1e"/>
  <path d="M 129 183 Q 145 176 171 183 L 173 186 Q 150 178 127 186 Z" fill="#2e2e2e"/>
  <!-- Eyes -->
  <ellipse cx="143" cy="195" rx="2.8" ry="2.8" fill="#100a04"/>
  <ellipse cx="157" cy="195" rx="2.8" ry="2.8" fill="#100a04"/>
  <circle cx="144.5" cy="194" r="0.9" fill="white" opacity="0.55"/>
  <circle cx="158.5" cy="194" r="0.9" fill="white" opacity="0.55"/>
  <!-- Eyebrows -->
  <path d="M 139 191 Q 143 189 147 191" stroke="#6b4420" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 153 191 Q 157 189 161 191" stroke="#6b4420" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 150 198 Q 147.5 203 150 205 Q 152.5 203 150 198" fill="#b07848"/>
  <!-- Beard -->
  <path d="M 134 206 Q 138 218 150 220 Q 162 218 166 206 Q 157 213 150 214 Q 143 213 134 206Z" fill="#5a3c18" opacity="0.72"/>
  <!-- Moustache -->
  <path d="M 142 205 Q 150 209 158 205" fill="none" stroke="#5a3c18" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Collar -->
  <path d="M 138 215 L 146 210 L 150 213 L 154 210 L 162 215" fill="none" stroke="#ddd" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Body / apron -->
  <path d="M 120 220 Q 117 235 120 246 L 180 246 Q 183 235 180 220 Q 166 228 150 228 Q 134 228 120 220Z" fill="#2a2a2a"/>
  <!-- Apron front lighter shade -->
  <path d="M 132 220 Q 129 234 131 246 L 169 246 Q 171 234 168 220 Q 158 226 150 227 Q 142 226 132 220Z" fill="#3e3e3e"/>
  <!-- Apron straps -->
  <path d="M 145 212 L 139 220" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 155 212 L 161 220" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm -->
  <path d="M 122 228 Q 107 238 98 252" stroke="#c49060" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Right arm -->
  <path d="M 178 228 Q 193 238 202 252" stroke="#c49060" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Sleeves / cuffs -->
  <path d="M 118 232 Q 106 242 100 252" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M 182 232 Q 194 242 200 252" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Hands -->
  <ellipse cx="96"  cy="254" rx="10" ry="8"  fill="#c49060"/>
  <ellipse cx="204" cy="254" rx="10" ry="8"  fill="#c49060"/>

  <!-- Laptop (left of person) -->
  <rect x="30" y="234" width="56" height="40" rx="3" fill="#1a1a2e"/>
  <rect x="33" y="237" width="50" height="33" rx="2" fill="#0d1117"/>
  <!-- Code on screen -->
  <rect x="36" y="240" width="24" height="2.5" rx="1" fill="#4f46e5" opacity="0.95"/>
  <rect x="36" y="245" width="40" height="2"   rx="1" fill="#6366f1" opacity="0.6"/>
  <rect x="36" y="249" width="32" height="2"   rx="1" fill="#6366f1" opacity="0.55"/>
  <rect x="36" y="253" width="38" height="2"   rx="1" fill="#4f46e5" opacity="0.45"/>
  <rect x="36" y="257" width="20" height="2"   rx="1" fill="#6366f1" opacity="0.4"/>
  <rect x="36" y="261" width="44" height="2"   rx="1" fill="#4f46e5" opacity="0.35"/>
  <!-- Laptop base -->
  <rect x="22" y="273" width="72" height="5" rx="2" fill="#111"/>

  <!-- Work object between hands (glowing circuit assembly) -->
  <rect x="122" y="256" width="56" height="18" rx="3" fill="#7a6035"/>
  <rect x="124" y="258" width="52" height="14" rx="2" fill="#8d7040"/>
  <circle cx="136" cy="265" r="5.5" fill="#4f46e5" opacity="0.9"/>
  <circle cx="150" cy="265" r="5.5" fill="#6366f1" opacity="0.85"/>
  <circle cx="164" cy="265" r="5.5" fill="#4f46e5" opacity="0.75"/>
  <line x1="141.5" y1="265" x2="144.5" y2="265" stroke="#f0ebe0" stroke-width="1.2" opacity="0.8"/>
  <line x1="155.5" y1="265" x2="158.5" y2="265" stroke="#f0ebe0" stroke-width="1.2" opacity="0.8"/>

  <!-- Workbench surface -->
  <rect x="24" y="276" width="252" height="13" rx="2.5" fill="#8b7045"/>
  <rect x="24" y="276" width="252" height="2.5" rx="1"   fill="#a08855" opacity="0.6"/>
  <line x1="24" y1="282" x2="276" y2="282" stroke="#7a6035" stroke-width="0.7" opacity="0.5"/>
  <!-- Legs -->
  <rect x="34"  y="288" width="10" height="24" rx="2" fill="#6b5030"/>
  <rect x="256" y="288" width="10" height="24" rx="2" fill="#6b5030"/>

  <!-- Scattered tool: pencil -->
  <g transform="rotate(-22,240,280)">
    <rect x="220" y="278" width="40" height="4.5" rx="2" fill="#f0c030"/>
    <polygon points="260,278 265,280 260,282.5" fill="#1a1a1a"/>
    <rect x="220" y="278" width="6"  height="4.5" rx="1" fill="#e08080"/>
  </g>

  <!-- ── Dark banner ─────────────────────────────────────── -->
  <rect x="9" y="317" width="282" height="30" fill="#0f0f0f"/>
  <text x="150" y="336" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="8.8" letter-spacing="2.8" fill="#f0ebe0" font-weight="700">AI · TRAINING · CONSULTING · PROJECTS</text>

  <!-- ── Section divider ornament ──────────────────────── -->
  <line x1="38"  y1="358" x2="127" y2="358" stroke="#1a1a1a" stroke-width="0.9"/>
  <polygon points="150,354 154,358 150,362 146,358" fill="#1a1a1a"/>
  <line x1="173" y1="358" x2="262" y2="358" stroke="#1a1a1a" stroke-width="0.9"/>

  <!-- ── AGENTIC AI ──────────────────────────────────────── -->
  <text x="150" y="382" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="27" font-weight="bold" fill="#0a0a0a">AGENTIC AI</text>

  <!-- ── &amp; INNOVATIVE SOLUTIONS ──────────────────────── -->
  <text x="150" y="400" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="14.5" font-weight="bold" fill="#0a0a0a">&amp; INNOVATIVE SOLUTIONS</text>

  <!-- ── Bottom divider ornament ───────────────────────── -->
  <line x1="38"  y1="411" x2="127" y2="411" stroke="#1a1a1a" stroke-width="0.9"/>
  <polygon points="150,407 154,411 150,415 146,411" fill="#1a1a1a"/>
  <line x1="173" y1="411" x2="262" y2="411" stroke="#1a1a1a" stroke-width="0.9"/>

  <!-- ── ULTRA FAST LEARNING ────────────────────────────── -->
  <text x="150" y="430" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="9.5" letter-spacing="3.5" fill="#0a0a0a" font-weight="700">ULTRA FAST LEARNING</text>

</svg>
